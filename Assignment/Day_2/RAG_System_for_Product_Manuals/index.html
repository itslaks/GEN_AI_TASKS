<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual RAG Assistant</title>
<style>
body {
    background: #0b0f19;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}
.container {
    width: 760px;
    background: #121826;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 0 40px rgba(0, 255, 255, 0.1);
}
textarea, button {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    margin-top: 15px;
}
textarea {
    background: #1e293b;
    color: #fff;
    resize: vertical;
}
button {
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
}
button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}
#response {
    margin-top: 20px;
    white-space: pre-wrap;
    line-height: 1.5;
}
#citations {
    margin-top: 14px;
}
.cite-card {
    margin-top: 8px;
    padding: 10px;
    background: #1f2937;
    border-left: 3px solid #00c6ff;
    border-radius: 10px;
}
</style>
</head>
<body>
<div class="container">
    <h1>Manual RAG Assistant</h1>
    <textarea id="question" rows="4" placeholder="Ask something from the manual..."></textarea>
    <button id="askBtn" onclick="askQuestion()">Ask</button>
    <div id="response"></div>
    <div id="citations"></div>
</div>
<script>
async function askQuestion() {
    const question = document.getElementById("question").value.trim();
    const responseBox = document.getElementById("response");
    const citationBox = document.getElementById("citations");
    const askBtn = document.getElementById("askBtn");

    if (!question) {
        responseBox.innerText = "Please enter a question.";
        citationBox.innerHTML = "";
        return;
    }

    askBtn.disabled = true;
    responseBox.innerText = "Thinking...";
    citationBox.innerHTML = "";

    try {
        const res = await fetch("/query", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({question})
        });

        const data = await res.json();
        if (!res.ok) {
            responseBox.innerText = data.error || "Request failed.";
            return;
        }

        responseBox.innerText = data.answer || "No answer returned.";
        citationBox.innerHTML = (data.citations || [])
            .map((c) => `<div class="cite-card">Page ${c.page} | ${c.section}</div>`)
            .join("");
    } catch (err) {
        responseBox.innerText = "Something went wrong. Please try again.";
        citationBox.innerHTML = "";
    } finally {
        askBtn.disabled = false;
    }
}
</script>
</body>
</html>
