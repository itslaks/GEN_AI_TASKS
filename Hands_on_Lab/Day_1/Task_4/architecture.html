<!DOCTYPE html>
<html>
<head>
    <title>System Architecture</title>
    <style>
        body { 
            margin: 0; 
            padding: 20px; 
            background: #1a1a1a; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 100vh;
        }
        svg { 
            max-width: 100%; 
            height: auto; 
        }
    </style>
</head>
<body>
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
        <!-- Title -->
        <text x="600" y="40" fill="#e8ff00" font-size="32" font-weight="bold" text-anchor="middle">
            Customer Support Chatbot Architecture
        </text>
        
        <!-- User Layer -->
        <rect x="50" y="100" width="200" height="120" fill="#2d2d2d" stroke="#e8ff00" stroke-width="2" rx="10"/>
        <text x="150" y="140" fill="#e8ff00" font-size="18" font-weight="bold" text-anchor="middle">User</text>
        <text x="150" y="165" fill="#f0f0f0" font-size="14" text-anchor="middle">Web Browser</text>
        <text x="150" y="190" fill="#b0b0b0" font-size="12" text-anchor="middle">Neon Yellow UI</text>
        
        <!-- Arrow 1 -->
        <path d="M 250 160 L 340 160" stroke="#e8ff00" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
        <text x="295" y="150" fill="#e8ff00" font-size="12">Query</text>
        
        <!-- Frontend -->
        <rect x="340" y="100" width="200" height="120" fill="#2d2d2d" stroke="#e8ff00" stroke-width="2" rx="10"/>
        <text x="440" y="140" fill="#e8ff00" font-size="18" font-weight="bold" text-anchor="middle">Frontend</text>
        <text x="440" y="165" fill="#f0f0f0" font-size="14" text-anchor="middle">index.html</text>
        <text x="440" y="190" fill="#b0b0b0" font-size="12" text-anchor="middle">Pattern Selection</text>
        
        <!-- Arrow 2 -->
        <path d="M 440 220 L 440 290" stroke="#e8ff00" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
        <text x="450" y="260" fill="#e8ff00" font-size="12">POST /chat</text>
        
        <!-- Backend -->
        <rect x="340" y="290" width="200" height="140" fill="#2d2d2d" stroke="#e8ff00" stroke-width="2" rx="10"/>
        <text x="440" y="330" fill="#e8ff00" font-size="18" font-weight="bold" text-anchor="middle">Backend</text>
        <text x="440" y="355" fill="#f0f0f0" font-size="14" text-anchor="middle">app.py</text>
        <text x="440" y="380" fill="#b0b0b0" font-size="12" text-anchor="middle">FastAPI Server</text>
        <text x="440" y="405" fill="#b0b0b0" font-size="12" text-anchor="middle">Port 8000</text>
        
        <!-- Arrow 3 -->
        <path d="M 540 360 L 630 360" stroke="#e8ff00" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
        <text x="585" y="350" fill="#e8ff00" font-size="12">Select Pattern</text>
        
        <!-- Prompt Patterns -->
        <rect x="630" y="100" width="520" height="330" fill="#1a1a1a" stroke="#e8ff00" stroke-width="3" rx="10"/>
        <text x="890" y="130" fill="#e8ff00" font-size="20" font-weight="bold" text-anchor="middle">Three Prompt Patterns</text>
        
        <!-- Pattern 1 -->
        <rect x="650" y="150" width="160" height="100" fill="#2d2d2d" stroke="#e8ff00" stroke-width="2" rx="8"/>
        <text x="730" y="175" fill="#e8ff00" font-size="14" font-weight="bold" text-anchor="middle">🔧 ReAct</text>
        <text x="730" y="195" fill="#f0f0f0" font-size="11" text-anchor="middle">Tool-using agent</text>
        <text x="730" y="210" fill="#b0b0b0" font-size="10" text-anchor="middle">Shows reasoning</text>
        <text x="730" y="225" fill="#b0b0b0" font-size="10" text-anchor="middle">+ tool traces</text>
        
        <!-- Pattern 2 -->
        <rect x="830" y="150" width="160" height="100" fill="#2d2d2d" stroke="#e8ff00" stroke-width="2" rx="8"/>
        <text x="910" y="175" fill="#e8ff00" font-size="14" font-weight="bold" text-anchor="middle">🧠 CoT</text>
        <text x="910" y="195" fill="#f0f0f0" font-size="11" text-anchor="middle">Chain-of-Thought</text>
        <text x="910" y="210" fill="#b0b0b0" font-size="10" text-anchor="middle">Hidden reasoning</text>
        <text x="910" y="225" fill="#b0b0b0" font-size="10" text-anchor="middle">+ step summary</text>
        
        <!-- Pattern 3 -->
        <rect x="1010" y="150" width="160" height="100" fill="#2d2d2d" stroke="#e8ff00" stroke-width="2" rx="8"/>
        <text x="1090" y="175" fill="#e8ff00" font-size="14" font-weight="bold" text-anchor="middle">✨ Reflect</text>
        <text x="1090" y="195" fill="#f0f0f0" font-size="11" text-anchor="middle">Self-Reflecting</text>
        <text x="1090" y="210" fill="#b0b0b0" font-size="10" text-anchor="middle">Draft → Critique</text>
        <text x="1090" y="225" fill="#b0b0b0" font-size="10" text-anchor="middle">→ Polished</text>
        
        <!-- All patterns handle same scenarios -->
        <text x="890" y="280" fill="#f0f0f0" font-size="12" font-weight="bold" text-anchor="middle">All Patterns Handle:</text>
        <text x="890" y="300" fill="#b0b0b0" font-size="11" text-anchor="middle">Order Status • Refunds • Subscriptions • Billing</text>
        <text x="890" y="318" fill="#b0b0b0" font-size="11" text-anchor="middle">Address Changes • Troubleshooting • Escalation</text>
        
        <text x="890" y="350" fill="#e8ff00" font-size="12" font-weight="bold" text-anchor="middle">Safety Features:</text>
        <text x="890" y="370" fill="#b0b0b0" font-size="11" text-anchor="middle">No PII requests • De-escalation • Fraud detection</text>
        <text x="890" y="388" fill="#b0b0b0" font-size="11" text-anchor="middle">Max 2 questions • Policy compliance</text>
        
        <!-- Arrow 4 -->
        <path d="M 890 430 L 890 490" stroke="#e8ff00" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
        <text x="910" y="465" fill="#e8ff00" font-size="12">Formatted Prompt</text>
        
        <!-- Groq API -->
        <rect x="790" y="490" width="200" height="120" fill="#2d2d2d" stroke="#e8ff00" stroke-width="2" rx="10"/>
        <text x="890" y="530" fill="#e8ff00" font-size="18" font-weight="bold" text-anchor="middle">Groq API</text>
        <text x="890" y="555" fill="#f0f0f0" font-size="14" text-anchor="middle">Llama 3.3 70B</text>
        <text x="890" y="580" fill="#b0b0b0" font-size="12" text-anchor="middle">Ultra-fast inference</text>
        <text x="890" y="595" fill="#b0b0b0" font-size="12" text-anchor="middle">&lt; 2 second response</text>
        
        <!-- Arrow 5 -->
        <path d="M 790 550 L 540 360" stroke="#e8ff00" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
        <text x="650" y="450" fill="#e8ff00" font-size="12">AI Response</text>
        
        <!-- Arrow 6 -->
        <path d="M 340 360 L 250 160" stroke="#e8ff00" stroke-width="2" fill="none" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
        <text x="280" y="250" fill="#e8ff00" font-size="12">Display Result</text>
        
        <!-- Key Features -->
        <rect x="50" y="480" width="280" height="280" fill="#2d2d2d" stroke="#e8ff00" stroke-width="2" rx="10"/>
        <text x="190" y="510" fill="#e8ff00" font-size="18" font-weight="bold" text-anchor="middle">Key Features</text>
        
        <text x="70" y="540" fill="#e8ff00" font-size="14">⚡ Performance</text>
        <text x="80" y="560" fill="#f0f0f0" font-size="12">• &lt; 2s response time</text>
        <text x="80" y="578" fill="#f0f0f0" font-size="12">• 400-800 tokens/response</text>
        
        <text x="70" y="608" fill="#e8ff00" font-size="14">🎨 Design</text>
        <text x="80" y="628" fill="#f0f0f0" font-size="12">• Neon yellow theme</text>
        <text x="80" y="646" fill="#f0f0f0" font-size="12">• Responsive layout</text>
        
        <text x="70" y="676" fill="#e8ff00" font-size="14">🔧 Tech Stack</text>
        <text x="80" y="696" fill="#f0f0f0" font-size="12">• FastAPI backend</text>
        <text x="80" y="714" fill="#f0f0f0" font-size="12">• Vanilla JS frontend</text>
        <text x="80" y="732" fill="#f0f0f0" font-size="12">• Single .env file</text>
        
        <!-- Data Flow Labels -->
        <text x="600" y="750" fill="#e8ff00" font-size="16" font-weight="bold" text-anchor="middle">End-to-End Data Flow</text>
        <text x="600" y="770" fill="#b0b0b0" font-size="12" text-anchor="middle">User Query → Pattern Selection → Groq AI → Formatted Response → User Display</text>
        
        <!-- Arrow marker definition -->
        <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="#e8ff00"/>
            </marker>
        </defs>
    </svg>
</body>
</html>
